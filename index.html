<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFORMATICS Handframe</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black:   #0D0D0D;
  --white:   #FAFAF5;
  --yellow:  #FFE500;
  --red:     #FF3B30;
  --green:   #00C853;
  --blue:    #0062FF;
  --gray:    #E8E8E0;
  --shadow:  4px 4px 0 var(--black);
  --shadow-lg: 6px 6px 0 var(--black);
  --border:  3px solid var(--black);
}

/* Menggunakan 100dvh agar tidak tertutup address bar HP */
html, body {
  height: 100dvh;
  background: var(--white);
  font-family: 'Space Grotesk', system-ui, sans-serif;
  color: var(--black);
  overflow: hidden;
}

video { display: none; }

/* ── Layout ─────────────────────────────────────── */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* ── Header ─────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  background: var(--yellow);
  border-bottom: var(--border);
  flex-shrink: 0;
}

.header-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.06em;
  line-height: 1;
}
.header-logo span { color: var(--black); opacity: 0.35; font-size: 14px; vertical-align: middle; margin-left: 6px; font-family: 'Space Grotesk', sans-serif; font-weight: 500; letter-spacing: 0.15em; }

.header-right { display: flex; align-items: center; gap: 10px; }

.badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 2px solid var(--black);
  box-shadow: 2px 2px 0 var(--black);
  background: var(--white);
}
.badge.live { background: var(--green); color: var(--white); }
.badge.live::before { content: '● '; }

/* ── Main layout (Responsive Flex) ───────────────── */
main {
  display: flex;
  flex-direction: row;
  flex: 1;
  overflow: hidden;
}

/* ── Camera section ─────────────────────────────── */
.cam-section {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  background: #1A1A1A;
  border-right: var(--border);
  position: relative;
}

/* Wrapper merespons aspek rasio video secara native */
.cam-wrapper {
  position: relative;
  border: var(--border);
  box-shadow: var(--shadow-lg);
  background: #000;
  overflow: hidden;
  max-width: 100%;
  max-height: 100%;
  aspect-ratio: 16 / 9; /* Akan ditimpa JS jika pakai HP portrait */
  margin: auto;
}

#canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Timer overlay */
#timer-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
#timer-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 20vw, 180px);
  color: #fff;
  line-height: 1;
  opacity: 0;
  transform: scale(1.4);
  transition: opacity 0.15s, transform 0.15s;
  text-shadow: 4px 4px 0 var(--yellow), 8px 8px 0 rgba(0,0,0,0.3);
  letter-spacing: -0.02em;
}
#timer-num.show { opacity: 1; transform: scale(1); }

/* Loading overlay */
#loading {
  position: absolute;
  inset: 0;
  background: #0D0D0D;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 20;
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid rgba(255,229,0,0.2);
  border-top-color: var(--yellow);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-msg {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,229,0,0.7);
}

/* Hint hands on camera */
#hint {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 32px;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
#hint.show { opacity: 1; }
.hint-hand {
  font-size: clamp(30px, 8vw, 40px);
  animation: bob 1.8s ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
}
.hint-hand:last-child { animation-delay: 0.4s; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* ── Side panel ──────────────────────────────────── */
.panel {
  width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  background: var(--white);
  padding: 14px;
  gap: 12px;
}

/* Panel card */
.pcard {
  border: var(--border);
  box-shadow: var(--shadow);
  background: var(--white);
  padding: 12px;
}
.pcard-title {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--black);
  opacity: 0.45;
  margin-bottom: 10px;
}

/* Filter controls */
.filter-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.f-btn {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 8px 4px;
  border: 2px solid var(--black);
  background: var(--gray);
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
}
.f-btn.active {
  background: var(--yellow);
  box-shadow: 2px 2px 0 var(--black);
  transform: translate(-1px, -1px);
}

/* Pinch indicators */
.pinch-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.pinch-card {
  border: 2px solid var(--black);
  padding: 10px 8px;
  text-align: center;
  background: var(--gray);
  transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
}
.pinch-card.active {
  background: var(--green);
  box-shadow: 3px 3px 0 var(--black);
  transform: translate(-1px, -1px);
}
.pinch-card.active .pinch-icon { filter: none; }
.pinch-icon {
  font-size: 28px;
  display: block;
  margin-bottom: 4px;
  filter: grayscale(1) opacity(0.4);
  transition: filter 0.15s;
}
.pinch-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* Frame size bar */
.size-bar-wrap {
  margin-top: 6px;
  border: 2px solid var(--black);
  height: 18px;
  background: var(--gray);
  position: relative;
  overflow: hidden;
}
.size-bar-fill {
  height: 100%;
  background: var(--yellow);
  border-right: 2px solid var(--black);
  transition: width 0.1s;
  width: 70%;
}
.size-val {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  mix-blend-mode: multiply;
}

/* Mode display */
.mode-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 2px solid var(--black);
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--gray);
  box-shadow: 2px 2px 0 var(--black);
  width: 100%;
}
.mode-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gray);
  border: 2px solid var(--black);
  flex-shrink: 0;
  transition: background 0.2s;
}
.mode-pill.idle .mode-dot    { background: var(--gray); }
.mode-pill.framing .mode-dot { background: var(--blue); }
.mode-pill.countdown .mode-dot { background: var(--red); animation: pulse-dot 0.5s ease infinite alternate; }
.mode-pill.captured .mode-dot { background: var(--green); }
@keyframes pulse-dot { to { transform: scale(1.5); } }
#mode-text { flex: 1; }

/* ── Status bar ──────────────────────────────────── */
footer {
  height: 38px;
  display: flex;
  align-items: center;
  padding: 0 18px;
  border-top: var(--border);
  background: var(--yellow);
  gap: 12px;
  flex-shrink: 0;
}
#status-msg {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  flex: 1;
}

/* ── Result screen ───────────────────────────────── */
#result-screen {
  position: fixed;
  inset: 0;
  background: var(--white);
  display: none;
  z-index: 30;
  animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.result-inner {
  display: flex;
  flex-direction: row;
  height: 100%;
}

.result-photo-area {
  flex: 1;
  background: #111;
  border-right: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px;
}

#result-img {
  max-width: 100%;
  max-height: 100%;
  border: var(--border);
  box-shadow: var(--shadow-lg);
  object-fit: contain;
}

.result-panel {
  width: 280px;
  padding: 24px 18px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  flex-shrink: 0;
  overflow-y: auto;
}

.result-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 0.04em;
  line-height: 1;
}
.result-sub {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  opacity: 0.45;
  text-transform: uppercase;
  margin-top: 4px;
}

.result-meta {
  border: var(--border);
  box-shadow: var(--shadow);
  padding: 12px;
  background: var(--gray);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.meta-row { display: flex; justify-content: space-between; }
.meta-row span:first-child { opacity: 0.45; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }

.btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }

.nbtn {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 14px 20px;
  border: var(--border);
  cursor: pointer;
  background: var(--white);
  box-shadow: var(--shadow);
  transition: transform 0.08s, box-shadow 0.08s;
  text-align: center;
}
.nbtn:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--black); }
.nbtn:active { transform: translate(2px,2px);   box-shadow: 2px 2px 0 var(--black); }
.nbtn.primary { background: var(--yellow); }
.nbtn.danger  { background: var(--red); color: var(--white); }

/* ── RESPONSIVE MOBILE FIX ───────────────────────── */
@media (max-width: 768px) {
  .header-logo { font-size: 20px; }
  
  main {
    flex-direction: column;
  }
  
  .cam-section {
    flex: none;
    height: 55dvh; /* Memberi ruang utama untuk kamera */
    padding: 10px;
    border-right: none;
    border-bottom: var(--border);
  }
  
  .panel {
    width: 100%;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr; /* Layout kartu 2 kolom di HP */
    gap: 12px;
    padding: 12px;
    align-content: start;
  }
  
  .pcard { padding: 10px; margin-bottom: 0; }
  
  /* Status Mode & Ukuran Bingkai ambil lebar penuh */
  .pcard:nth-child(1), .pcard:nth-child(4) {
    grid-column: span 2;
  }
  
  .result-inner {
    flex-direction: column;
  }
  
  .result-photo-area {
    flex: none;
    height: 50dvh;
    border-right: none;
    border-bottom: var(--border);
    padding: 14px;
  }
  
  .result-panel {
    width: 100%;
    flex: 1;
  }
}
</style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>

<div class="app">
  <header>
    <div class="header-logo">INFORMATICS <span style="opacity:1;font-size:26px;font-family:'Bebas Neue',sans-serif;letter-spacing:0.06em;">Handframe</span></div>
    <div class="header-right">
      <div class="badge live" id="live-badge">LIVE</div>
      <div class="badge" id="mp-badge">MEDIAPIPE</div>
    </div>
  </header>

  <main>
    <div class="cam-section">
      <div class="cam-wrapper">
        <canvas id="canvas"></canvas>

        <div id="timer-overlay">
          <div id="timer-num">3</div>
        </div>

        <div id="hint">
          <div class="hint-hand">🤏</div>
          <div class="hint-hand">🤏</div>
        </div>

        <div id="loading">
          <div class="spinner"></div>
          <div id="loading-msg">Memuat model hands…</div>
        </div>
      </div>
    </div>

    <aside class="panel">
      <div class="pcard">
        <div class="pcard-title">Status Mode</div>
        <div class="mode-pill idle" id="mode-pill">
          <div class="mode-dot"></div>
          <div id="mode-text">IDLE</div>
        </div>
      </div>

      <div class="pcard">
        <div class="pcard-title">Filter Foto</div>
        <div class="filter-row">
          <button class="f-btn active" data-f="none">Normal</button>
          <button class="f-btn" data-f="grayscale(100%)">B & W</button>
          <button class="f-btn" data-f="sepia(80%)">Sepia</button>
          <button class="f-btn" data-f="hue-rotate(90deg) contrast(130%)">Cyber</button>
        </div>
      </div>

      <div class="pcard">
        <div class="pcard-title">Deteksi Pinch</div>
        <div class="pinch-row">
          <div class="pinch-card" id="card-left">
            <span class="pinch-icon">🤏</span>
            <div class="pinch-label">Kiri</div>
          </div>
          <div class="pinch-card" id="card-right">
            <span class="pinch-icon">🤏</span>
            <div class="pinch-label">Kanan</div>
          </div>
        </div>
      </div>

      <div class="pcard">
        <div class="pcard-title">Ukuran Bingkai</div>
        <div class="size-bar-wrap">
          <div class="size-bar-fill" id="size-bar"></div>
          <div class="size-val" id="size-val">70%</div>
        </div>
      </div>
    </aside>
  </main>

  <footer>
    <div id="status-msg">Izinkan akses kamera untuk mulai</div>
  </footer>
</div>

<div id="result-screen">
  <div class="result-inner">
    <div class="result-photo-area">
      <img id="result-img" alt="Foto hasil" />
    </div>
    <div class="result-panel">
      <div>
        <div class="result-title">FOTO<br>BERHASIL!</div>
        <div class="result-sub">Pinch Camera · HandFrame</div>
      </div>
      <div class="result-meta">
        <div class="meta-row"><span>Waktu</span><span id="meta-time">—</span></div>
        <div class="meta-row"><span>Ukuran</span><span id="meta-size">—</span></div>
      </div>
      <div class="btn-group">
        <button class="nbtn primary" onclick="downloadPhoto()">⬇ Simpan Foto</button>
        <button class="nbtn" onclick="retake()">↩ Foto Lagi</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
/* ── Elements ── */
const video       = document.getElementById('video');
const canvas      = document.getElementById('canvas');
const ctx         = canvas.getContext('2d');
const timerNum    = document.getElementById('timer-num');
const loadingEl   = document.getElementById('loading');
const loadingMsg  = document.getElementById('loading-msg');
const hintEl      = document.getElementById('hint');
const statusMsg   = document.getElementById('status-msg');
const resultScreen= document.getElementById('result-screen');
const resultImg   = document.getElementById('result-img');
const modePill    = document.getElementById('mode-pill');
const modeText    = document.getElementById('mode-text');
const cardLeft    = document.getElementById('card-left');
const cardRight   = document.getElementById('card-right');
const sizeBar     = document.getElementById('size-bar');
const sizeVal     = document.getElementById('size-val');
const metaTime    = document.getElementById('meta-time');
const metaSize    = document.getElementById('meta-size');
const filterBtns  = document.querySelectorAll('.f-btn');

/* ── State ── */
let state      = 'loading';
let frame      = { x: 0.5, y: 0.5, size: 0.70 }; 
let initDist   = null;
let initSize   = 0.70;
let cdVal      = 3;
let cdInterval = null;
let photoDataUrl = null;
let idleCount  = 0;
let currentFilter = 'none';
let triggerCapture = false; // Mempercepat render dan menghapus lag

/* ── Filter Logic ── */
filterBtns.forEach(btn => {
  btn.addEventListener('click', (e) => {
    filterBtns.forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.getAttribute('data-f');
  });
});

/* ── Helpers ── */
function dist2D(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx*dx + dy*dy);
}

// Deteksi pinch HD dinamis (anti jempol salah paham)
function isPinching(lms) {
  if (!lms || lms.length < 21) return false;
  const fingerDist = dist2D(lms[4], lms[8]);
  const handScale  = dist2D(lms[0], lms[9]); 
  if (handScale === 0) return false;
  return (fingerDist / handScale) < 0.38; 
}

function pinchCenter(lms) {
  return { x: (lms[4].x + lms[8].x) / 2, y: (lms[4].y + lms[8].y) / 2 };
}

/* ── UI update ── */
function setMode(m, label) {
  modePill.className = 'mode-pill ' + m;
  modeText.textContent = label;
}
function updateSizeUI() {
  const pct = Math.round(frame.size * 100);
  sizeBar.style.width = pct + '%';
  sizeVal.textContent = pct + '%';
}

/* ── Frame geometry (Merespons native resolusi) ── */
function getFramePx() {
  const W = canvas.width, H = canvas.height;
  const fw = W * frame.size;
  const fh = fw * 0.5625;
  let fx = (1 - frame.x) * W - fw / 2;
  let fy = frame.y * H - fh / 2;

  if (fx < 0) fx = 0;
  if (fx + fw > W) fx = W - fw;
  if (fy < 0) fy = 0;
  if (fy + fh > H) fy = H - fh;

  return { fx, fy, fw, fh };
}

/* ── Draw frame overlay (UI Auto Scale untuk HD) ── */
function drawFrame(pulse) {
  const { fx, fy, fw, fh } = getFramePx();
  const W = canvas.width, H = canvas.height;
  const scale = W / 800; // Skala dinamis agar garis UI tidak tipis di resolusi HD

  /* vignette */
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0,      0,        W,  fy);
  ctx.fillRect(0,      fy+fh,    W,  H - fy - fh);
  ctx.fillRect(0,      fy,       fx, fh);
  ctx.fillRect(fx+fw,  fy,       W - fx - fw, fh);

  /* border */
  const a = pulse ? (0.6 + 0.35*Math.sin(Date.now()/150)) : 1;
  ctx.strokeStyle = `rgba(255,229,0,${a})`;
  ctx.lineWidth = 3 * scale;
  ctx.strokeRect(fx+1.5, fy+1.5, fw-3, fh-3);

  /* neubrutalism corners */
  const cl = Math.min(fw,fh) * 0.08;
  ctx.strokeStyle = '#FFE500';
  ctx.lineWidth = 5 * scale;
  ctx.lineCap = 'square';
  [
    [fx,    fy,    cl, 0,    0,  cl],
    [fx+fw, fy,   -cl, 0,    0,  cl],
    [fx,    fy+fh, cl, 0,    0, -cl],
    [fx+fw, fy+fh,-cl, 0,    0, -cl],
  ].forEach(([ox,oy,hx,hy,vx,vy])=>{
    ctx.beginPath();
    ctx.moveTo(ox+hx, oy+hy);
    ctx.lineTo(ox,    oy);
    ctx.lineTo(ox+vx, oy+vy);
    ctx.stroke();
  });
}

/* ── Draw pinch dots (Auto Scale HD) ── */
function drawPinchDot(x, y, active) {
  const sx = (1-x)*canvas.width, sy = y*canvas.height;
  const scale = canvas.width / 800;
  
  ctx.beginPath(); ctx.arc(sx, sy, 14 * scale, 0, Math.PI*2);
  ctx.fillStyle = active ? 'rgba(255,229,0,0.2)' : 'rgba(255,255,255,0.1)';
  ctx.fill();
  
  ctx.beginPath(); ctx.arc(sx, sy, 7 * scale, 0, Math.PI*2);
  ctx.fillStyle = active ? '#FFE500' : 'rgba(255,255,255,0.5)';
  ctx.fill();
  
  ctx.strokeStyle = '#0D0D0D'; ctx.lineWidth = 2 * scale;
  ctx.stroke();
}

/* ── Countdown ── */
function startCountdown() {
  if (state === 'countdown') return;
  state = 'countdown';
  cdVal = 3;
  timerNum.textContent = cdVal;
  timerNum.classList.add('show');
  setMode('countdown','COUNTDOWN');
  statusMsg.textContent = 'Bersiap…';

  cdInterval = setInterval(()=>{
    cdVal--;
    if (cdVal > 0) {
      timerNum.textContent = cdVal;
    } else {
      clearInterval(cdInterval); cdInterval = null;
      timerNum.classList.remove('show');
      triggerCapture = true; // Triggers Zero-Lag Capture di onResults
    }
  }, 1000);
}

function cancelCountdown() {
  if (cdInterval) { clearInterval(cdInterval); cdInterval = null; }
  cdVal = 3;
  timerNum.classList.remove('show');
}

/* ── ZERO-LAG HD Capture ── */
// Tidak perlu lagi render offscreen raksasa dua kali, langsung ambil dari canvas yang sudah HD
function executeHDCapture() {
  state = 'captured';
  const { fx, fy, fw, fh } = getFramePx();

  const clampedFx = Math.max(0, Math.min(canvas.width - fw, fx));
  const clampedFy = Math.max(0, Math.min(canvas.height - fh, fy));

  const cropCanvas = document.createElement('canvas');
  cropCanvas.width = Math.round(fw);
  cropCanvas.height = Math.round(fh);
  const cropCtx = cropCanvas.getContext('2d');

  cropCtx.drawImage(
    canvas, 
    Math.round(clampedFx), Math.round(clampedFy), Math.round(fw), Math.round(fh),
    0, 0, Math.round(fw), Math.round(fh)
  );

  /* flash */
  const fl = document.createElement('div');
  fl.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:99;pointer-events:none;transition:opacity 0.5s';
  document.body.appendChild(fl);
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    fl.style.opacity='0'; setTimeout(()=>fl.remove(),550);
  }); });

  photoDataUrl = cropCanvas.toDataURL('image/jpeg', 0.95);
  const now = new Date();
  metaTime.textContent = now.toLocaleTimeString('id-ID');
  metaSize.textContent = Math.round(fw)+'×'+Math.round(fh)+' px (HD)';
  resultImg.src = photoDataUrl;
  setMode('captured','CAPTURED');
  hintEl.classList.remove('show');
  setTimeout(()=>{ resultScreen.style.display='flex'; }, 150);
}

/* ── Retake ── */
function retake() {
  state   = 'idle';
  frame   = { x:0.5, y:0.5, size:0.70 }; 
  initDist = null;
  idleCount = 0;
  resultScreen.style.display = 'none';
  cancelCountdown();
  setMode('idle','IDLE');
  updateSizeUI();
  statusMsg.textContent = 'Pinch kedua tangan untuk membingkai';
  hintEl.classList.add('show');
  cardLeft.classList.remove('active');
  cardRight.classList.remove('active');
}

/* ── Download ── */
function downloadPhoto() {
  if (!photoDataUrl) return;
  const a = document.createElement('a');
  a.href = photoDataUrl;
  a.download = 'handframe-'+Date.now()+'.jpg';
  a.click();
}

/* ── MediaPipe results ── */
function onResults(results) {
  if (state === 'captured' || state === 'loading') return;

  const vW = results.image.width;
  const vH = results.image.height;

  // Singkronisasi Native Canvas agar HD 1:1 terhadap input kamera (Responsive tanpa resize script kaku)
  if (canvas.width !== vW || canvas.height !== vH) {
    canvas.width = vW;
    canvas.height = vH;
    document.querySelector('.cam-wrapper').style.aspectRatio = `${vW} / ${vH}`;
  }

  const W = canvas.width, H = canvas.height;

  /* draw mirrored video WITH FILTER */
  ctx.save();
  ctx.translate(W, 0); ctx.scale(-1, 1);
  ctx.filter = currentFilter; 
  ctx.drawImage(results.image, 0, 0, W, H);
  ctx.filter = 'none'; 
  ctx.restore();

  // Eksekusi foto SEBELUM UI (kuning-kuning) digambar agar gambar bersih & tanpa lag memory
  if (triggerCapture) {
    triggerCapture = false;
    executeHDCapture();
    return;
  }

  const lms    = results.multiHandLandmarks ?? [];
  const nHands = lms.length;

  const sortedLms = [...lms].sort((a, b) => b[0].x - a[0].x);

  let pLeft = false, pRight = false;
  let pc1 = null, pc2 = null;

  if (nHands >= 1) { pLeft  = isPinching(sortedLms[0]); pc1 = pinchCenter(sortedLms[0]); }
  if (nHands >= 2) { pRight = isPinching(sortedLms[1]); pc2 = pinchCenter(sortedLms[1]); }

  cardLeft.classList.toggle('active', pLeft);
  cardRight.classList.toggle('active', pRight && nHands >= 2);

  const bothPinching = nHands === 2 && pLeft && pRight;

  if (bothPinching) {
    cancelCountdown();
    hintEl.classList.remove('show');
    state = 'framing';
    idleCount = 0;

    const cx = (pc1.x + pc2.x) / 2;
    const cy = (pc1.y + pc2.y) / 2;
    const d  = dist2D(pc1, pc2);

    if (!initDist) { initDist = d; initSize = frame.size; }
    
    const targetSize = Math.max(0.12, Math.min(1.0, initSize * (d / initDist)));
    
    // Smooth EMA Filter
    const alpha = 0.25; 
    frame.size += (targetSize - frame.size) * alpha;
    frame.x += (cx - frame.x) * alpha;
    frame.y += (cy - frame.y) * alpha;

    updateSizeUI();
    drawFrame(false);

    drawPinchDot(pc1.x, pc1.y, true);
    drawPinchDot(pc2.x, pc2.y, true);

    ctx.beginPath();
    ctx.moveTo((1-pc1.x)*W, pc1.y*H);
    ctx.lineTo((1-pc2.x)*W, pc2.y*H);
    ctx.strokeStyle='rgba(255,229,0,0.35)';
    ctx.lineWidth=1.5 * (W/800); ctx.setLineDash([5,9]); ctx.stroke(); ctx.setLineDash([]);

    setMode('framing','FRAMING');
    statusMsg.textContent = 'Lepas pinch untuk mulai timer…';

  } else if (state === 'framing') {
    initDist = null;
    drawFrame(false);
    startCountdown();

  } else if (state === 'countdown') {
    drawFrame(true);

    if (nHands >= 1 && pc1) drawPinchDot(pc1.x, pc1.y, pLeft);
    if (nHands >= 2 && pc2) drawPinchDot(pc2.x, pc2.y, pRight);

    if (bothPinching) {
      cancelCountdown();
      state = 'framing';
      initDist = null;
      setMode('framing','FRAMING');
      statusMsg.textContent = 'Lepas pinch untuk mulai timer…';
    }

  } else {
    idleCount++;
    if (idleCount > 20) hintEl.classList.add('show');

    if (nHands === 0) {
      cardLeft.classList.remove('active');
      cardRight.classList.remove('active');
    }

    setMode('idle','IDLE');
    statusMsg.textContent = 'Pinch kedua tangan untuk membingkai foto';
  }
}

/* ── Init MediaPipe ── */
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.72,
  minTrackingConfidence: 0.55,
});
hands.onResults(onResults);

const camera = new Camera(video, {
  onFrame: async () => {
    if (state !== 'captured') await hands.send({ image: video });
  },
  width: 1280, 
  height: 720,
  facingMode: 'user' // Memaksa prioritas kamera selfie saat dibuka dari HP
});

camera.start().then(()=>{
  state = 'idle';
  loadingEl.style.display = 'none';
  document.getElementById('live-badge').style.display = 'flex';
  statusMsg.textContent = 'Pinch kedua tangan untuk membingkai foto';
  hintEl.classList.add('show');
  setMode('idle','IDLE');
}).catch(err=>{
  loadingMsg.textContent = 'Kamera ditolak — izinkan di browser';
  console.error(err);
});
</script>
